name: Preview Environment

# Dispatched from twentyhq/twenty's `.github/workflows/preview-env-dispatch.yaml`
# via workflow_dispatch.
#
# Runs the attacker-controlled `docker-compose.yml` and `Dockerfile` from
# the PR head SHA, so this job must be treated as fully compromised: a
# malicious PR can bind-mount the runner host and read anything in the job.
#
# Therefore no secret is reachable by attacker code at all. The cloudflared
# tunnel is started and its URL is dispatched back to ci-privileged BEFORE any
# attacker-controlled code runs (checkout/build/up). The dispatch uses a
# short-lived token from a dedicated, minimal GitHub App (actions:write on
# ci-privileged only), revoked immediately after use — so no usable credential
# remains on the runner while untrusted code executes. ci-privileged holds the
# App key that can write to twenty and posts the PR comment.
#
# Base images (postgres, redis, node) are pulled anonymously through a public
# pull-through mirror (mirror.gcr.io) configured below, which avoids Docker
# Hub's anonymous rate limits without any credential.
#
# Lives in the PUBLIC ci-public repo so the 5h keepalive runs on free
# Actions minutes (private repos bill them).

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number on twentyhq/twenty'
        required: true
        type: string
      pr_head_sha:
        description: 'PR head SHA to check out and build'
        required: true
        type: string
      repo:
        description: 'Source repo (owner/name)'
        required: true
        type: string

permissions: {}

jobs:
  preview-environment:
    timeout-minutes: 310
    runs-on: ubuntu-latest
    steps:
      - name: Create Tunnel
        id: expose-tunnel
        env:
          CLOUDFLARED_VERSION: '2026.3.0'
        run: |
          set -euo pipefail

          # Install cloudflared (pinned for reproducibility)
          sudo curl -fsSL -o /usr/local/bin/cloudflared \
            "https://github.com/cloudflare/cloudflared/releases/download/${CLOUDFLARED_VERSION}/cloudflared-linux-amd64"
          sudo chmod +x /usr/local/bin/cloudflared
          cloudflared --version

          # Start an account-less "quick tunnel" pointing at the (not-yet-running)
          # server container. Cloudflare assigns the https://*.trycloudflare.com
          # URL immediately — before the backend exists — so it can be handed off
          # before any attacker-controlled code runs.
          log_file="$RUNNER_TEMP/cloudflared.log"
          : > "$log_file"

          cloudflared tunnel \
            --url http://localhost:3000 \
            --no-autoupdate \
            --logfile "$log_file" \
            --loglevel info \
            > "$RUNNER_TEMP/cloudflared.stdout" 2>&1 &

          pid=$!
          echo "$pid" > "$RUNNER_TEMP/cloudflared.pid"
          echo "cloudflared PID: $pid"

          # Wait up to 2 minutes for the URL to appear; fail fast if cloudflared exits.
          url=''
          for _ in $(seq 1 60); do
            url=$(grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' "$log_file" 2>/dev/null | head -n1 || true)
            [ -n "$url" ] && break
            if ! kill -0 "$pid" 2>/dev/null; then
              echo "cloudflared exited before producing a URL"
              cat "$log_file" || true
              exit 1
            fi
            sleep 2
          done

          if [ -z "$url" ]; then
            echo "Timed out waiting for tunnel URL"
            cat "$log_file" || true
            exit 1
          fi

          echo "Tunnel URL: $url"
          echo "tunnel-url=$url" >> "$GITHUB_OUTPUT"

      # Mint a short-lived installation token from a DEDICATED, minimal GitHub
      # App whose only permission is actions:write on ci-privileged. Even if it
      # leaked, the blast radius is "trigger workflows on ci-privileged" — same
      # as a scoped PAT, but org-owned and auto-expiring. This runs BEFORE any
      # attacker-controlled code, and the token is revoked right after use below.
      - name: Mint ci-privileged dispatch token
        id: dispatch-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.PREVIEW_DISPATCH_APP_CLIENT_ID }}
          private-key: ${{ secrets.PREVIEW_DISPATCH_APP_PRIVATE_KEY }}
          owner: twentyhq
          repositories: ci-privileged
          permission-actions: write
          # Revoked explicitly right after use (below), so skip the action's
          # end-of-job revoke which would otherwise run after untrusted code.
          skip-token-revoke: true

      - name: Dispatch PR comment to ci-privileged
        # Runs BEFORE any attacker-controlled code (checkout/build/up). The token
        # is used and then immediately revoked, so no usable credential remains
        # on the runner while untrusted code executes.
        env:
          GH_TOKEN: ${{ steps.dispatch-token.outputs.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          TARGET_REPO: ${{ inputs.repo }}
          TUNNEL_URL: ${{ steps.expose-tunnel.outputs.tunnel-url }}
        run: |
          set -euo pipefail
          gh workflow run preview-env-comment.yaml --repo twentyhq/ci-privileged --ref main \
            -f pr_number="$PR_NUMBER" \
            -f repo="$TARGET_REPO" \
            -f tunnel_url="$TUNNEL_URL"
          # Revoke the installation token now — before checkout/build/up — so it
          # can't be exfiltrated by attacker-controlled code later in the job.
          gh api --method DELETE /installation/token || true

      - name: Checkout twentyhq/twenty at PR head
        uses: actions/checkout@v5
        with:
          repository: twentyhq/twenty
          ref: ${{ inputs.pr_head_sha }}
          persist-credentials: false

      - name: Route Docker Hub pulls through a public mirror (no credentials)
        # Public base images (postgres, redis, node) go through Google's
        # mirror.gcr.io pull-through cache, which has far higher anonymous limits
        # than Docker Hub — so no Docker Hub credential is needed on this runner.
        run: |
          set -euo pipefail
          echo '{ "registry-mirrors": ["https://mirror.gcr.io"] }' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          # Wait for the daemon to come back up before anything tries to use it.
          for _ in $(seq 1 30); do docker info >/dev/null 2>&1 && break; sleep 1; done
          docker info | sed -n '/Registry Mirrors/,/Live Restore/p' || true

      - name: Run compose setup
        run: |
          echo "Patching docker-compose.yml..."
          # change image to localbuild using yq
          yq eval 'del(.services.server.image)' -i packages/twenty-docker/docker-compose.yml
          yq eval '.services.server.build.context = "../../"' -i packages/twenty-docker/docker-compose.yml
          yq eval '.services.server.build.dockerfile = "./packages/twenty-docker/twenty/Dockerfile"' -i packages/twenty-docker/docker-compose.yml
          yq eval '.services.server.build.target = "twenty"' -i packages/twenty-docker/docker-compose.yml

          yq eval 'del(.services.worker.image)' -i packages/twenty-docker/docker-compose.yml
          yq eval '.services.worker.build.context = "../../"' -i packages/twenty-docker/docker-compose.yml
          yq eval '.services.worker.build.dockerfile = "./packages/twenty-docker/twenty/Dockerfile"' -i packages/twenty-docker/docker-compose.yml
          yq eval '.services.worker.build.target = "twenty"' -i packages/twenty-docker/docker-compose.yml

          echo "Adding SIGN_IN_PREFILLED environment variable to server service..."
          yq eval '.services.server.environment.SIGN_IN_PREFILLED = "${SIGN_IN_PREFILLED}"' -i packages/twenty-docker/docker-compose.yml

          echo "Setting up .env file..."
          cp packages/twenty-docker/.env.example packages/twenty-docker/.env

          echo "Generating secrets..."
          echo "" >> packages/twenty-docker/.env
          echo "# === Randomly generated secrets ===" >> packages/twenty-docker/.env
          echo "APP_SECRET=$(openssl rand -base64 32)" >> packages/twenty-docker/.env
          echo "PG_DATABASE_PASSWORD=$(openssl rand -hex 16)" >> packages/twenty-docker/.env
          echo "SIGN_IN_PREFILLED=true" >> packages/twenty-docker/.env
          echo "Docker compose build..."
          cd packages/twenty-docker/
          docker compose build
        working-directory: ./

      - name: Start services with correct SERVER_URL
        env:
          TUNNEL_URL: ${{ steps.expose-tunnel.outputs.tunnel-url }}
        run: |
          cd packages/twenty-docker/

          echo "Setting SERVER_URL to $TUNNEL_URL"
          sed -i '/SERVER_URL=/d' .env
          echo "" >> .env
          echo "SERVER_URL=$TUNNEL_URL" >> .env

          # Start the services
          echo "Docker compose up..."
          docker compose up -d || {
              echo "Docker compose failed to start"
              docker compose logs
              exit 1
          }

          echo "Waiting for services to be ready..."
          count=0
          while [ ! $(docker inspect --format='{{.State.Health.Status}}' twenty-db-1) = "healthy" ] || [ ! $(docker inspect --format='{{.State.Health.Status}}' twenty-server-1) = "healthy" ]; do
              sleep 5
              count=$((count+1))
              if [ $count -gt 60 ]; then
                  echo "Timeout waiting for services to be ready"
                  docker compose logs
                  exit 1
              fi
              echo "Still waiting for services... ($count/60)"
          done

          echo "All services are up and running!"
        working-directory: ./

      - name: Seed Dev Workspace
        run: |
          cd packages/twenty-docker/
          echo "Seeding light dev workspace (Apple only)..."
          if ! docker compose exec -T server yarn command:prod workspace:seed:dev --light; then
            echo "❌ Seeding light dev workspace failed. Dumping server logs..."
            docker compose logs server
            exit 1
          fi
        working-directory: ./

      - name: Keep tunnel alive for 5 hours
        run: timeout 300m sleep 18000 # Stop on whichever we reach first (300m or 5hour sleep)

      - name: Cleanup
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/cloudflared.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/cloudflared.pid")" 2>/dev/null || true
          fi
          if [ -d packages/twenty-docker ]; then
            cd packages/twenty-docker/
            docker compose down -v || true
          fi
        working-directory: ./
